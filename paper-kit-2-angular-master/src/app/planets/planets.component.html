<div class="wrapper">
  <div
    class="page-header page-header-xs"
    data-parallax="true"
    style="background-image: url('./assets/img/main.jpg')"
  >
    <div class="filter"></div>
  </div>
  <div class="container">
    <div class="tim-title">
      <h3>Available planets to explore</h3>
    </div>
    <div class="d-flex flex-row justify-content-around mb-3 planet">
      <div class="col-sm-3 col-md-3" (click)="open()">
        <img
          src="assets/img/planets/earth.gif"
          class="img-circle img-no-padding img-responsive"
          alt="Rounded Image"
        />
        <p class="text-center">Earth</p>
      </div>
      <div class="col-sm-3 col-md-3 planet" (click)="open()">
        <img
          src="assets/img/planets/mars.gif"

          alt="Rounded Image"
        />
        <p class="text-center">Mars</p>
      </div>
      <div class="col-sm-3 col-md-3 planet" (click)="open()">

          src="assets/img/planets/mercury.gif"
          class="img-circle img-no-padding img-responsive"
          alt="Rounded Image"
        />
        <p class="text-center">Mercury</p>
      </div>
    </div>
    <div class="d-flex flex-row justify-content-around mb-3">
      <div class="col-sm-3 col-md-3 planet" (click)="open()">

          src="assets/img/planets/jupiter.gif"
          class="img-circle img-no-padding img-responsive"
