<div class="wrapper">
  <div
    class="page-header page-header-xs"
    data-parallax="true"
    style="background-image: url('./assets/img/main.jpg')"
  >
    <div class="filter"></div>
  </div>
  <div class="container">
    <div class="tim-title d-flex justify-content-center">
      <h3>
        <span class="label label-primary"><strong>Payment</strong></span>
      </h3>
    </div>
    <div class="d-flex flex-row justify-content-around mb-3">
      <div class="col-lg-12">
        <ngb-accordion
          #acc="ngbAccordion"
          closeOthers="true"
          activeIds="payment"
        >
          <ngb-panel title="Payment details" id="payment">
            <ng-template ngbPanelContent>
              <h4 class="mt-0 d-flex align-items-center">
                <strong>Order total: 2999.25</strong> &nbsp;<i
                  class="nc-icon nc-atom"
                ></i>
              </h4>

              <h4 class="mb-3">
                <strong>Payment options</strong>
              </h4>
              <div class="row">
                <div class="col-sm-12 col-lg-12">
                  <table class="table">
                    <thead>
                      <tr>
                        <th scope="col">Option</th>
                        <th scope="col"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr *ngFor="let option of options">
                        <td *ngIf="option === 'Bank Transfer'">
                          <div class="d-flex align-item-center">
                            {{ option }} (1 &nbsp;<i
                              class="nc-icon nc-atom pt-1"
                            ></i
                            >&nbsp; (atom) = 2.99 &euro;)
                          </div>
                        </td>
                        <td *ngIf="option !== 'Bank Transfer'">
                          {{ option }}
                        </td>
                        <td>
                          <button
                            type="button"
                            class="btn btn-outline-success btn-round mr-3"
                            routerLink="/orders"
                          >
                            Pay now
                          </button>
                          &nbsp;
                          <button
                            type="button"
                            class="btn btn-outline-default btn-round mr-3"
                            routerLink="/orders"
                          >
                            Get pay link via email
                          </button>
                          &nbsp;
                          <button
                            type="button"
                            class="btn btn-outline-default btn-round mr-3"
                            routerLink="/orders"
                          >
                            Get pay link via email next day
                          </button>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </ng-template>
          </ngb-panel>
        </ngb-accordion>

        <div class="row justify-content-center">
          <button
            type="button"
            class="btn btn-outline-danger btn-round mr-3"
            routerLink="/orders/cancel"
          >
            Cancel the order
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
